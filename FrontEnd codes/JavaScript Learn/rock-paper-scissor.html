<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors</title>
    <link rel = "Stylesheet" href = "rock-paper-scissor.css">
    <script src = "game.js" defer></script>
</head>
<body>
    <p class = "title">Rock Paper Scissors GAME</p>
    <button onclick="rock()" class ="emoji-button" ><img src = "rock-emoji.png"class = "emoji"></button>
    <button onclick="paper()" class ="emoji-button"><img src = "paper-emoji.png"class = "emoji"></button>
    <button onclick ="scissor()" class ="emoji-button"><img src = "scissors-emoji.png"class = "emoji"></button>
    <br>
    <p id = "result" class = "result"></p>
    <p id = "move" class = "move"></p>
    <p id = "score" class = "score">Wins: 0, Losses: 0, Tie!: 0</p>
    <button onclick="reset()" class = "reset-button">Reset Score</button>
</body>
</html>
